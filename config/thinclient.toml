[Dial]
  [Dial.Unix]
    Address = "@katzenpost"

# To dial the client daemon over TCP instead of the abstract Unix
# socket, comment out the [Dial.Unix] block above and uncomment the
# block below. Exactly one of [Dial.Unix] or [Dial.Tcp] must be set;
# the thin client rejects a file that populates both. The daemon's
# matching [Listen] block in client.toml must agree.
#
# [Dial.Tcp]
#   Address = "localhost:64331"
#   Network = "tcp"
